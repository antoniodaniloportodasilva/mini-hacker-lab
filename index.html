<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Treinamento Hacker Kids</title>

<style>
    body {
        background-color: #000;
        color: #00ff00;
        font-family: "Courier New", monospace;
        text-align: center;
        padding: 20px;
    }

    h1 {
        text-shadow: 0 0 10px #00ff00;
    }

    .terminal {
        border: 2px solid #00ff00;
        padding: 20px;
        margin-top: 20px;
        height: 250px;
        overflow-y: auto;
        text-align: left;
    }

    #keyboard {
        margin-top: 20px;
    }

    .key {
        display: inline-block;
        border: 1px solid #00ff00;
        padding: 10px;
        margin: 5px;
        width: 40px;
        text-align: center;
        border-radius: 5px;
        transition: 0.2s;
    }

    .key.active {
        background-color: #00ff00;
        color: #000;
        box-shadow: 0 0 10px #00ff00;
    }

    .special {
        width: auto;
        padding: 10px 20px;
    }

    #cursor {
        animation: piscar 1s infinite;
    }

    @keyframes piscar {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
    }
</style>

</head>
<body>

<h1>💻 Treinamento Hacker Kids</h1>
<p>Pressione teclas para aprender 👇</p>

<div class="terminal" id="terminal">
    <p>> Sistema iniciado...</p>
</div>

<!-- TECLADO AGORA FICA ABAIXO -->
<div id="keyboard"></div>

<script>
const keyboardDiv = document.getElementById("keyboard");
const terminal = document.getElementById("terminal");

// Criar teclado A-Z
for (let i = 65; i <= 90; i++) {
    let key = document.createElement("div");
    key.classList.add("key");
    key.innerText = String.fromCharCode(i);
    key.id = "key-" + String.fromCharCode(i);
    keyboardDiv.appendChild(key);
}

// Teclas especiais
const especiais = ["SHIFT", "ENTER", "SPACE", "CTRL"];

especiais.forEach(tecla => {
    let key = document.createElement("div");
    key.classList.add("key", "special");
    key.innerText = tecla;
    key.id = "key-" + tecla;
    keyboardDiv.appendChild(key);
});

// Terminal
function log(msg) {
    let p = document.createElement("p");
    p.innerText = "> " + msg;
    terminal.appendChild(p);
    terminal.scrollTop = terminal.scrollHeight;
}

// Input estilo terminal
let inputAtual = "";
let linhaInput = document.createElement("p");
linhaInput.innerHTML = "> <span id='input'></span><span id='cursor'>█</span>";
terminal.appendChild(linhaInput);

const inputSpan = document.getElementById("input");

// Nome secreto
let sequencia = "";
const nomeSecreto = "LORRAN";

// Upgrade fake
function executarUpgrade() {
    log("Iniciando atualização do sistema...");

    let mensagens = [
        "Conectando ao servidor...",
        "Baixando pacotes...",
        "Instalando módulos...",
        "Atualizando sistema...",
        "Upgrade concluído com sucesso ✅",
        "Bem-vindo, Lorran 😎"
    ];

    let i = 0;

    let intervalo = setInterval(() => {
        if (i < mensagens.length) {
            log(mensagens[i]);
            i++;
        } else {
            clearInterval(intervalo);
        }
    }, 700);
}

// Atualiza input
function atualizarInput() {
    inputSpan.textContent = inputAtual;
}

// Evento principal (UNIFICADO)
document.addEventListener("keydown", function(event) {

    let tecla = event.key;
    let teclaUpper = tecla.toUpperCase();

    // Destaque teclado
    let keyDiv = document.getElementById("key-" + teclaUpper);
    if (keyDiv) {
        keyDiv.classList.add("active");
        setTimeout(() => keyDiv.classList.remove("active"), 200);
    }

    // Digitação normal
    if (tecla.length === 1) {
        inputAtual += tecla;
    }

    if (tecla === " ") {
        inputAtual += " ";
        event.preventDefault();
    }

    if (tecla === "Backspace") {
        inputAtual = inputAtual.slice(0, -1);
    }

    if (tecla === "Enter") {
        log(inputAtual);

        if (inputAtual.toUpperCase() === nomeSecreto) {
            executarUpgrade();
        } else {
            log("Comando não reconhecido ❌");
        }

        inputAtual = "";
    }

    atualizarInput();

    // CTRL + comandos
    if (event.ctrlKey) {
        switch(teclaUpper) {
            case "A":
                log("CTRL + A → Selecionar tudo 🟢");
                break;
            case "B":
                log("CTRL + B → Modo hacker 😎");
                break;
            case "C":
                log("CTRL + C → Copiar 📁");
                break;
            case "D":
                log("CTRL + D → Defesa 🛡️");
                break;
            case "E":
                log("CTRL + E → Energia ⚡");
                break;
            default:
                log("CTRL + " + teclaUpper + " → Comando secreto 🤫");
        }
    }
});
</script>

</body>
</html>
